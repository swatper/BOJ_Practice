name: Algorithm To Notion

on:
  push:
    branches:
      - main
  workflow_dispatch:
       inputs:
        mode:
          description: '실행 모드 (init: 전체, update: 일부)'
          default: 'init' # 추후 업데이트 기능 구현 시 활용
          required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run Notion Script
        env:
          NOTION_API: ${{ secrets.NOTION_API }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          NOTION_DATABASE_ID_BOJ: ${{ secrets.NOTION_DATABASE_ID_BOJ }}
          NOTION_DATABASE_ID_PROG: ${{ secrets.NOTION_DATABASE_ID_PROG }}
          # 변경된 파일 목록을 환경 변수로 전달
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          RUN_MODE: ${{ github.event.inputs.mode || 'update' }}
        run: python -u upload_to_notion.py
